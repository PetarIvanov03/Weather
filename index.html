<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
</head>
<body>

    <!-- Crossfading background (two stacked layers) -->
    <div id="bg" aria-hidden="true">
        <div class="bg-layer" id="bg-a"></div>
        <div class="bg-layer" id="bg-b"></div>
    </div>
    <div id="bg-scrim" aria-hidden="true"></div>

    <main>
        <!-- Header: city search + language toggle -->
        <div class="app-header animate-fade-in">
            <div class="search-wrap">
                <div class="search-pill glass">
                    <input type="text" id="weather-search-input" placeholder="Search city…" autocomplete="off"
                        role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="search-dropdown">
                    <button id="weather-search-btn" aria-label="Search">
                        <svg class="wx-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </div>
                <div id="search-dropdown" class="hidden" role="listbox" aria-label="City suggestions"></div>
            </div>
            <button id="lang-toggle" class="icon-btn glass" aria-label="Switch language">EN</button>
        </div>

        <!-- State screens -->
        <div id="state-screen" class="hidden animate-fade-in state-wrap" role="status" aria-live="polite">
            <div class="glass state-card">
                <div id="state-loading" class="hidden state-block state-block--loading">
                    <div class="spinner"></div>
                    <p id="loading-message" class="t-body loading-message">Loading…</p>
                </div>
                <div id="state-error" class="hidden state-block">
                    <svg width="46" height="41" viewBox="0 0 34 30" opacity="0.9" aria-hidden="true">
                        <circle cx="12" cy="16" r="8" fill="#e9edf3" opacity="0.95"></circle>
                        <circle cx="20" cy="13" r="9" fill="#f4f6f9"></circle>
                        <rect x="7" y="18" width="22" height="8" rx="4" fill="#eef1f5"></rect>
                        <line x1="6" y1="4" x2="28" y2="27" stroke="#9fb3d1" stroke-width="2.5" stroke-linecap="round"></line>
                    </svg>
                    <p id="error-title" class="t-body-emph state-title">Something went wrong</p>
                    <p id="error-message" class="t-body">Could not load weather data.</p>
                    <button id="error-retry" class="glass state-retry-btn">Try again</button>
                </div>
                <div id="state-empty" class="hidden state-block">
                    <svg class="wx-icon empty-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <p id="empty-title" class="t-body-emph state-title">No location set</p>
                    <p id="empty-message" class="t-body">Search for a city above to see the weather.</p>
                </div>
            </div>
        </div>

        <!-- Weather -->
        <div id="weather-card" class="hidden animate-fade-in">
            <div class="wx-layout">

                <!-- Left panel -->
                <section class="wx-panel">
                    <div class="panel-photo" aria-hidden="true">
                        <div class="pp-layer" id="pp-a"></div>
                        <div class="pp-layer" id="pp-b"></div>
                    </div>
                    <div class="panel-scrim" aria-hidden="true"></div>
                    <div class="panel-inner">

                        <!-- Hero -->
                        <div class="hero">
                            <div class="hero-temp t-display"><span id="weather-temp">--</span>°</div>
                            <div class="hero-top">
                                <span class="hero-city t-title" id="weather-city">--</span>
                                <span class="hero-time t-body" id="weather-localtime"></span>
                            </div>
                            <div class="hero-bottom">
                                <div class="t-condition" id="weather-condition">--</div>
                                <div class="t-body" id="weather-hilo">H:--° L:--°</div>
                                <div class="t-cap" id="weather-feels">Feels like --°</div>
                            </div>
                        </div>

                        <!-- Hourly rail -->
                        <div class="rail-outer" id="hourly-rail-outer">
                            <div><span class="t-cap-heading" data-i18n="hourly">Hourly forecast</span></div>
                            <div class="rail-viewport">
                                <span class="rail-chevron" style="left: 0;">‹</span>
                                <span class="rail-chevron" style="right: 0;">›</span>
                                <div class="rail" id="hourly-rail"></div>
                            </div>
                        </div>

                        <!-- Secondary cards -->
                        <div class="secondary">
                            <div class="glass info-card">
                                <div class="t-cap-heading" data-i18n="uvIndex">UV Index</div>
                                <div class="info-value-row"><span class="t-value" id="weather-uv">--</span></div>
                                <div class="uv-bar-wrap">
                                    <span class="t-body" id="uv-label">&nbsp;</span>
                                    <div class="bar-track"><div id="uv-bar" style="width: 0%; height: 100%; border-radius: 3px; background: linear-gradient(90deg, #9fd68a, #ffd97a);"></div></div>
                                </div>
                            </div>
                            <div class="glass info-card">
                                <div class="t-cap-heading" data-i18n="wind">Wind</div>
                                <div class="info-value-row">
                                    <span class="t-value" id="weather-wind">--</span>
                                    <svg id="wind-arrow" width="22" height="22" viewBox="0 0 30 30" style="transition: transform 0.5s;">
                                        <circle cx="15" cy="15" r="13" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"></circle>
                                        <path d="M15 6L20 18H10Z" fill="#f7f5f0"></path>
                                    </svg>
                                </div>
                                <div class="t-body"><span data-i18n="kmh">km/h</span> · <span id="wind-dir">--</span></div>
                            </div>
                            <div class="glass info-card">
                                <div class="t-cap-heading" data-i18n="humidity">Humidity</div>
                                <div class="info-value-row"><span class="t-value"><span id="weather-humidity">--</span>%</span></div>
                                <div class="t-body"><span data-i18n="dewPoint">Dew point</span> <span id="dew-point">--</span>°</div>
                            </div>
                            <div class="glass info-card">
                                <div class="t-cap-heading" data-i18n="sunsun">Sunrise / Sunset</div>
                                <div class="info-value-row"><span class="t-value" id="sunrise">--</span></div>
                                <div class="t-body"><span data-i18n="sets">Sets</span> <span id="sunset">--</span></div>
                            </div>
                        </div>

                    </div>
                </section>

                <!-- Right column: 14-day forecast -->
                <aside class="wx-right">
                    <div class="glass forecast-card">
                        <div class="t-cap-heading forecast-heading" data-i18n="forecast14">14-Day Forecast</div>
                        <div id="weather-forecast-list" class="forecast-scroll"></div>
                    </div>
                </aside>

            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
