<div class="max-w-xl mx-auto flex flex-col items-center justify-start py-10 w-full animate-fade-in px-4">
    <h1 class="text-3xl font-light tracking-tighter mb-8 text-zinc-900 dark:text-zinc-100">Weather</h1>

    <!-- Search Section -->
    <div class="w-full relative mb-8">
        <input
            type="text"
            id="weather-search-input"
            placeholder="Search city..."
            class="w-full bg-transparent text-zinc-900 dark:text-zinc-100 border-b border-zinc-300 dark:border-zinc-800 px-2 py-3 pr-10 focus:outline-none focus:border-zinc-500 transition-colors text-lg placeholder-zinc-400 dark:placeholder-zinc-600"
            autocomplete="off"
        >
        <button
            id="weather-search-btn"
            class="absolute right-0 top-1/2 transform -translate-y-1/2 p-2 text-zinc-400 hover:text-zinc-600 dark:text-zinc-500 dark:hover:text-zinc-300 transition-colors active:scale-95"
            aria-label="Search"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </button>
    </div>

    <!-- Status / Loading / Error Message -->
    <div id="weather-status-msg" class="text-zinc-500 text-sm mb-4 min-h-[1.25rem]">
        <!-- Pulses when loading: animate-pulse -->
    </div>

    <!-- Weather Display Card (Hidden by Default) -->
    <div id="weather-card" class="w-full flex-col hidden gap-4">

        <!-- Current Weather Glassmorphism Card -->
        <div class="w-full bg-white/60 dark:bg-zinc-900/50 backdrop-blur-md rounded-3xl border border-white/40 dark:border-zinc-800/80 shadow-sm dark:shadow-none p-8 flex flex-col items-center">
            <h2 id="weather-city" class="text-2xl font-light tracking-tight text-zinc-900 dark:text-zinc-100 mb-1">--</h2>
            <p id="weather-country" class="text-zinc-500 text-xs mb-6 uppercase tracking-widest">--</p>

            <div class="flex flex-col items-center justify-center mb-6">
                <span id="weather-temp" class="text-7xl font-light text-zinc-900 dark:text-zinc-100 tracking-tighter">--°</span>
                <span id="weather-condition" class="text-sm text-zinc-600 dark:text-zinc-400 mt-2 font-light tracking-wide">--</span>
            </div>

            <div class="w-full grid grid-cols-4 gap-2 mt-4 border-t border-zinc-200 dark:border-zinc-800/50 pt-6">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Feels</span>
                    <span id="weather-feels-like" class="text-sm font-light text-zinc-700 dark:text-zinc-300">--°</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Wind</span>
                    <span id="weather-wind" class="text-sm font-light text-zinc-700 dark:text-zinc-300">--</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Hum</span>
                    <span id="weather-humidity" class="text-sm font-light text-zinc-700 dark:text-zinc-300">--%</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">UV</span>
                    <span id="weather-uv" class="text-sm font-light text-zinc-700 dark:text-zinc-300">--</span>
                </div>
            </div>
        </div>

        <!-- 7-Day Forecast Glassmorphism Card -->
        <div class="w-full bg-white/60 dark:bg-zinc-900/50 backdrop-blur-md rounded-3xl border border-white/40 dark:border-zinc-800/80 shadow-sm dark:shadow-none p-6 flex flex-col">
            <h3 class="text-xs text-zinc-500 uppercase tracking-widest mb-4 ml-1">7-Day Forecast</h3>
            <div id="weather-forecast-list" class="flex flex-col space-y-4">
                <!-- Forecast items will be injected here -->
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
    }
</style>
