<div class="max-w-md mx-auto w-full mt-10 space-y-6">
    <h2 class="text-2xl font-light mb-4">Base Converter</h2>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-500 mb-1">Decimal (Base 10)</label>
            <input type="text" id="bc-dec" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2 font-mono text-lg">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-500 mb-1">Binary (Base 2)</label>
            <input type="text" id="bc-bin" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2 font-mono text-lg">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-500 mb-1">Hexadecimal (Base 16)</label>
            <input type="text" id="bc-hex" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2 font-mono text-lg uppercase">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-500 mb-1">Octal (Base 8)</label>
            <input type="text" id="bc-oct" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2 font-mono text-lg">
        </div>
    </div>
</div>
