<div class="max-w-3xl mx-auto w-full mt-10 space-y-6">
    <h2 class="text-2xl font-light mb-4">Base64 Encoder/Decoder</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col h-64">
            <label class="block text-sm font-medium text-gray-500 mb-2">Plain Text</label>
            <textarea id="b64-plain" class="flex-grow w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-3 resize-none font-sans"></textarea>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col h-64">
            <label class="block text-sm font-medium text-gray-500 mb-2">Base64 Encoded</label>
            <textarea id="b64-encoded" class="flex-grow w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-3 resize-none font-mono text-sm"></textarea>
        </div>
    </div>
</div>
