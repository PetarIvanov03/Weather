<div class="max-w-md mx-auto w-full mt-10 space-y-6">
    <h2 class="text-2xl font-light mb-4">Aspect Ratio Calculator</h2>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
        <div class="flex items-center space-x-4 mb-6">
            <div class="flex-1">
                <label class="block text-xs font-medium text-gray-500 mb-1">Ratio Width</label>
                <input type="number" id="ar-rw" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2 text-center" value="16">
            </div>
            <div class="text-xl text-gray-400 mt-4">:</div>
            <div class="flex-1">
                <label class="block text-xs font-medium text-gray-500 mb-1">Ratio Height</label>
                <input type="number" id="ar-rh" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2 text-center" value="9">
            </div>
        </div>

        <div class="flex items-center space-x-4 mb-6">
            <div class="flex-1">
                <label class="block text-xs font-medium text-gray-500 mb-1">Pixel Width (W)</label>
                <input type="number" id="ar-w" class="w-full bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800 rounded-lg p-3 text-center font-bold" value="1920">
            </div>
            <div class="text-xl text-gray-400 mt-4">×</div>
            <div class="flex-1">
                <label class="block text-xs font-medium text-gray-500 mb-1">Pixel Height (H)</label>
                <input type="number" id="ar-h" class="w-full bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800 rounded-lg p-3 text-center font-bold" value="1080">
            </div>
        </div>

        <div class="flex justify-center">
            <div id="ar-box" class="bg-gray-200 dark:bg-gray-700 transition-all duration-300" style="width: 160px; height: 90px;"></div>
        </div>
    </div>
</div>
