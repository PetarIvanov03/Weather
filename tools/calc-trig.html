<div class="max-w-lg mx-auto w-full mt-10">
    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">

        <div class="mb-6 flex bg-gray-100 dark:bg-gray-900 rounded-lg p-1">
            <button id="unit-deg" class="flex-1 py-2 text-sm font-medium rounded-md bg-white dark:bg-gray-800 shadow-sm transition-all text-gray-900 dark:text-white">Degrees</button>
            <button id="unit-rad" class="flex-1 py-2 text-sm font-medium rounded-md text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-all">Radians</button>
        </div>

        <div class="mb-6">
            <label for="trig-input" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Input Value</label>
            <input type="number" id="trig-input" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-lg rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3" placeholder="0" step="any">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="p-4 bg-gray-50 dark:bg-gray-900 rounded-xl">
                <div class="text-sm text-gray-500 dark:text-gray-400 mb-1">Sin</div>
                <div id="trig-sin" class="text-xl font-medium tracking-tight">0.0000</div>
            </div>
            <div class="p-4 bg-gray-50 dark:bg-gray-900 rounded-xl">
                <div class="text-sm text-gray-500 dark:text-gray-400 mb-1">Cos</div>
                <div id="trig-cos" class="text-xl font-medium tracking-tight">1.0000</div>
            </div>
            <div class="p-4 bg-gray-50 dark:bg-gray-900 rounded-xl">
                <div class="text-sm text-gray-500 dark:text-gray-400 mb-1">Tan</div>
                <div id="trig-tan" class="text-xl font-medium tracking-tight">0.0000</div>
            </div>
            <div class="p-4 bg-gray-50 dark:bg-gray-900 rounded-xl">
                <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" id="trig-conv-label">To Radians</div>
                <div id="trig-conv" class="text-xl font-medium tracking-tight">0.0000</div>
            </div>
        </div>
    </div>
</div>
