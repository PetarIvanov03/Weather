<div class="max-w-md mx-auto w-full mt-10 space-y-6">
    <h2 class="text-2xl font-light mb-4">Unit Converter</h2>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
        <div class="flex justify-between items-center mb-4 border-b border-gray-200 dark:border-gray-700 pb-2">
            <button class="uc-tab text-indigo-600 dark:text-indigo-400 font-medium" data-type="length">Length</button>
            <button class="uc-tab text-gray-500 hover:text-gray-900 dark:hover:text-white" data-type="weight">Weight</button>
            <button class="uc-tab text-gray-500 hover:text-gray-900 dark:hover:text-white" data-type="temp">Temperature</button>
        </div>

        <div class="flex space-x-4 items-center">
            <div class="flex-1">
                <input type="number" id="uc-in" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2 mb-2" value="1">
                <select id="uc-unit-in" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2"></select>
            </div>
            <div class="text-2xl text-gray-400">=</div>
            <div class="flex-1">
                <input type="number" id="uc-out" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2 mb-2" readonly>
                <select id="uc-unit-out" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2"></select>
            </div>
        </div>
    </div>
</div>
