<div class="max-w-md mx-auto w-full mt-10 space-y-6">
    <h2 class="text-2xl font-light mb-4">Password Generator</h2>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 space-y-6">

        <div class="flex items-center">
            <input type="text" id="pw-out" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-l-lg p-3 font-mono text-lg text-center" readonly>
            <button id="pw-copy" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 h-full py-3 rounded-r-lg transition-colors font-medium">Copy</button>
        </div>

        <div>
            <div class="flex justify-between mb-2">
                <label class="text-sm font-medium text-gray-500">Length</label>
                <span id="pw-len-val" class="font-bold text-indigo-600 dark:text-indigo-400">16</span>
            </div>
            <input type="range" id="pw-len" min="4" max="64" value="16" class="w-full cursor-pointer accent-indigo-600">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <label class="flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" id="pw-upper" checked class="w-4 h-4 text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500 dark:focus:ring-indigo-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                <span class="text-sm font-medium">Uppercase (A-Z)</span>
            </label>
            <label class="flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" id="pw-lower" checked class="w-4 h-4 text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500 dark:focus:ring-indigo-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                <span class="text-sm font-medium">Lowercase (a-z)</span>
            </label>
            <label class="flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" id="pw-num" checked class="w-4 h-4 text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500 dark:focus:ring-indigo-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                <span class="text-sm font-medium">Numbers (0-9)</span>
            </label>
            <label class="flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" id="pw-sym" checked class="w-4 h-4 text-indigo-600 bg-gray-100 border-gray-300 rounded focus:ring-indigo-500 dark:focus:ring-indigo-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                <span class="text-sm font-medium">Symbols (!@#$)</span>
            </label>
        </div>

        <button id="pw-gen" class="w-full bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-900 dark:text-white py-3 rounded-lg font-medium transition-colors">Generate New Password</button>
    </div>
</div>
