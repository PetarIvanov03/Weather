<div class="max-w-md mx-auto w-full mt-10 space-y-6">
    <h2 class="text-2xl font-light mb-4">Percentage Calculator</h2>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
        <div class="mb-2 text-sm font-medium text-gray-500">What is X% of Y?</div>
        <div class="flex items-center space-x-2">
            <input type="number" id="p1-x" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2" placeholder="X">
            <span>% of</span>
            <input type="number" id="p1-y" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2" placeholder="Y">
            <span>=</span>
            <div id="p1-res" class="font-bold text-lg min-w-[3rem]">0</div>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
        <div class="mb-2 text-sm font-medium text-gray-500">X is what percent of Y?</div>
        <div class="flex items-center space-x-2">
            <input type="number" id="p2-x" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2" placeholder="X">
            <span>is</span>
            <div id="p2-res" class="font-bold text-lg min-w-[3rem]">0%</div>
            <span>of</span>
            <input type="number" id="p2-y" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2" placeholder="Y">
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
        <div class="mb-2 text-sm font-medium text-gray-500">Percentage increase/decrease from X to Y</div>
        <div class="flex items-center space-x-2">
            <span>From</span>
            <input type="number" id="p3-x" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2" placeholder="X">
            <span>to</span>
            <input type="number" id="p3-y" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2" placeholder="Y">
            <span>is</span>
            <div id="p3-res" class="font-bold text-lg min-w-[4rem]">0%</div>
        </div>
    </div>
</div>
