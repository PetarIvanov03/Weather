<div class="max-w-md mx-auto w-full mt-10 space-y-6">
    <h2 class="text-2xl font-light mb-4">Stopwatch & Timer</h2>

    <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 text-center">
        <div id="sw-display" class="text-6xl font-light font-mono mb-8 tracking-wider">00:00:00.00</div>

        <div class="flex justify-center space-x-4 mb-8">
            <button id="sw-start" class="w-16 h-16 rounded-full bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 font-medium hover:bg-green-200 dark:hover:bg-green-900/50 transition-colors">Start</button>
            <button id="sw-lap" class="w-16 h-16 rounded-full bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300 font-medium hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Lap</button>
            <button id="sw-reset" class="w-16 h-16 rounded-full bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 font-medium hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors">Reset</button>
        </div>

        <div class="max-h-48 overflow-y-auto text-left border-t border-gray-200 dark:border-gray-700 pt-4" id="sw-laps">
            <!-- Laps -->
        </div>
    </div>
</div>
