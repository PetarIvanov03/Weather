<div class="max-w-md mx-auto w-full mt-10 space-y-6">
    <h2 class="text-2xl font-light mb-4">Randomizer</h2>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 space-y-6">
        <div>
            <h3 class="font-medium text-gray-700 dark:text-gray-300 mb-2">Number Generator</h3>
            <div class="flex items-center space-x-2">
                <input type="number" id="rn-min" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2" value="1">
                <span class="text-gray-500">to</span>
                <input type="number" id="rn-max" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2" value="100">
                <button id="rn-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium">Roll</button>
            </div>
            <div id="rn-res" class="text-4xl font-bold text-center mt-4 h-12 text-indigo-600 dark:text-indigo-400"></div>
        </div>

        <hr class="border-gray-200 dark:border-gray-700">

        <div>
            <h3 class="font-medium text-gray-700 dark:text-gray-300 mb-2">Name Picker</h3>
            <textarea id="np-list" class="w-full h-24 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg p-2 resize-none text-sm" placeholder="Enter names, one per line"></textarea>
            <button id="np-btn" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium">Pick a Winner</button>
            <div id="np-res" class="text-2xl font-bold text-center mt-4 h-8 text-rose-600 dark:text-rose-400 truncate"></div>
        </div>
    </div>
</div>
