<div class="max-w-md mx-auto w-full mt-6 space-y-6">
    <h2 class="text-2xl font-light mb-4 tracking-tight">Тракер за Макроси и Порции</h2>

    <div class="bg-white/50 dark:bg-zinc-900/50 backdrop-blur-md p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 space-y-6">
        <!-- Total Food Inputs -->
        <div>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Общо количество храна</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center border-b border-gray-200 dark:border-gray-700 pb-1">
                    <label class="text-sm font-medium text-gray-600 dark:text-gray-300">Общо тегло (г)</label>
                    <input type="number" id="mt-total-weight" class="w-24 bg-transparent text-right outline-none text-gray-900 dark:text-gray-100 placeholder-gray-400" placeholder="0">
                </div>
                <div class="flex justify-between items-center border-b border-gray-200 dark:border-gray-700 pb-1">
                    <label class="text-sm font-medium text-gray-600 dark:text-gray-300">Калории (ккал)</label>
                    <input type="number" id="mt-total-cal" class="w-24 bg-transparent text-right outline-none text-gray-900 dark:text-gray-100 placeholder-gray-400" placeholder="0">
                </div>
                <div class="flex justify-between items-center border-b border-gray-200 dark:border-gray-700 pb-1">
                    <label class="text-sm font-medium text-gray-600 dark:text-gray-300">Белтъчини (г)</label>
                    <input type="number" id="mt-total-pro" class="w-24 bg-transparent text-right outline-none text-gray-900 dark:text-gray-100 placeholder-gray-400" placeholder="0">
                </div>
                <div class="flex justify-between items-center border-b border-gray-200 dark:border-gray-700 pb-1">
                    <label class="text-sm font-medium text-gray-600 dark:text-gray-300">Мазнини (г)</label>
                    <input type="number" id="mt-total-fat" class="w-24 bg-transparent text-right outline-none text-gray-900 dark:text-gray-100 placeholder-gray-400" placeholder="0">
                </div>
                <div class="flex justify-between items-center border-b border-gray-200 dark:border-gray-700 pb-1">
                    <label class="text-sm font-medium text-gray-600 dark:text-gray-300">Въглехидрати (г)</label>
                    <input type="number" id="mt-total-car" class="w-24 bg-transparent text-right outline-none text-gray-900 dark:text-gray-100 placeholder-gray-400" placeholder="0">
                </div>
            </div>
        </div>

        <!-- Slider -->
        <div class="pt-4 border-t border-gray-200 dark:border-gray-800">
            <div class="flex justify-between items-center mb-2">
                <label class="text-sm font-medium text-gray-600 dark:text-gray-300">Размер на порцията</label>
                <span class="text-sm font-bold text-indigo-600 dark:text-indigo-400"><span id="mt-percent-val">50</span>%</span>
            </div>
            <input type="range" id="mt-slider" min="0" max="100" value="50" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700 accent-indigo-600">
        </div>

        <!-- Calculated Portion Outputs -->
        <div class="pt-4 border-t border-gray-200 dark:border-gray-800">
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Макроси за порцията</h3>
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="p-3 bg-white/40 dark:bg-zinc-800/40 rounded-xl">
                    <div class="text-xs text-gray-500 uppercase">Тегло (г)</div>
                    <div id="mt-port-weight" class="text-xl font-bold text-gray-900 dark:text-gray-100">0</div>
                </div>
                <div class="p-3 bg-white/40 dark:bg-zinc-800/40 rounded-xl">
                    <div class="text-xs text-gray-500 uppercase">Калории</div>
                    <div id="mt-port-cal" class="text-xl font-bold text-rose-600 dark:text-rose-400">0</div>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4 text-center mt-4">
                <div class="p-3 bg-white/40 dark:bg-zinc-800/40 rounded-xl">
                    <div class="text-xs text-gray-500 uppercase">Белтъчини</div>
                    <div id="mt-port-pro" class="text-lg font-bold text-blue-600 dark:text-blue-400">0</div>
                </div>
                <div class="p-3 bg-white/40 dark:bg-zinc-800/40 rounded-xl">
                    <div class="text-xs text-gray-500 uppercase">Мазнини</div>
                    <div id="mt-port-fat" class="text-lg font-bold text-yellow-600 dark:text-yellow-400">0</div>
                </div>
                <div class="p-3 bg-white/40 dark:bg-zinc-800/40 rounded-xl">
                    <div class="text-xs text-gray-500 uppercase">Въглехидрати</div>
                    <div id="mt-port-car" class="text-lg font-bold text-green-600 dark:text-green-400">0</div>
                </div>
            </div>
        </div>
    </div>
</div>
