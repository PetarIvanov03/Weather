<div class="max-w-6xl mx-auto w-full mt-10 space-y-4 h-[calc(100vh-10rem)] flex flex-col">
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-light">Diff Checker</h2>
        <button id="dc-compare" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">Compare Texts</button>
    </div>

    <div class="grid grid-cols-2 gap-4 flex-grow" id="dc-inputs">
        <textarea id="dc-original" class="w-full h-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-4 resize-none shadow-sm font-mono text-sm" placeholder="Original Text..."></textarea>
        <textarea id="dc-modified" class="w-full h-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-4 resize-none shadow-sm font-mono text-sm" placeholder="Modified Text..."></textarea>
    </div>

    <div id="dc-result" class="hidden flex-grow bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-4 overflow-y-auto font-mono text-sm whitespace-pre-wrap"></div>

    <div class="text-right">
        <button id="dc-reset" class="hidden px-4 py-2 text-sm text-gray-500 hover:text-gray-900 dark:hover:text-white transition-colors">Reset</button>
    </div>
</div>
