<div class="max-w-sm mx-auto w-full mt-10 text-center">
    <h2 class="text-3xl font-bold mb-2">Tic-Tac-Toe</h2>
    <div class="text-gray-500 mb-6 font-medium" id="ttt-status">You (X) vs AI (O)</div>

    <div class="grid grid-cols-3 gap-2 bg-gray-300 dark:bg-gray-700 p-2 rounded-xl w-fit mx-auto" id="ttt-board">
        <div class="w-24 h-24 bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" data-idx="0"></div>
        <div class="w-24 h-24 bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" data-idx="1"></div>
        <div class="w-24 h-24 bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" data-idx="2"></div>
        <div class="w-24 h-24 bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" data-idx="3"></div>
        <div class="w-24 h-24 bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" data-idx="4"></div>
        <div class="w-24 h-24 bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" data-idx="5"></div>
        <div class="w-24 h-24 bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" data-idx="6"></div>
        <div class="w-24 h-24 bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" data-idx="7"></div>
        <div class="w-24 h-24 bg-white dark:bg-gray-800 rounded-lg flex items-center justify-center text-5xl font-bold cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors" data-idx="8"></div>
    </div>

    <button id="ttt-reset" class="mt-8 px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors">Restart Game</button>
</div>
