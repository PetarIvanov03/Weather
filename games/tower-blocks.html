<div class="max-w-fit mx-auto w-full mt-10 text-center">
    <h2 class="text-3xl font-bold mb-4">Tower Blocks</h2>
    <div class="mb-4">
        <span class="text-xs uppercase font-bold text-gray-500">Score</span>
        <span id="tb-score" class="text-2xl font-bold ml-2">0</span>
    </div>
    <div class="relative cursor-pointer touch-none" id="tb-container">
        <canvas id="tb-canvas" width="300" height="400" class="bg-gray-100 dark:bg-gray-800 border-2 border-gray-300 dark:border-gray-700 rounded-lg shadow-inner"></canvas>
        <div id="tb-msg" class="absolute inset-0 flex flex-col items-center justify-center bg-black/50 text-white font-bold rounded-lg pointer-events-none">
            <div class="text-2xl mb-2">Click to Drop</div>
        </div>
    </div>
</div>
