<div class="max-w-fit mx-auto w-full mt-10 flex space-x-8">
    <div>
        <h2 class="text-3xl font-bold mb-4">Tetris</h2>
        <canvas id="tetris-canvas" width="200" height="400" class="bg-gray-100 dark:bg-gray-800 border-2 border-gray-300 dark:border-gray-700 rounded-lg shadow-inner"></canvas>
    </div>
    <div class="flex flex-col justify-center space-y-6">
        <div>
            <div class="text-xs uppercase font-bold text-gray-500">Score</div>
            <div id="tetris-score" class="font-bold text-3xl">0</div>
        </div>
        <div class="text-sm text-gray-500">
            <p>↑ Rotate</p>
            <p>← Left</p>
            <p>→ Right</p>
            <p>↓ Drop</p>
        </div>
        <button id="tetris-start" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors">Start Game</button>
    </div>
</div>
